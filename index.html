<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Contactos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1> Agenda de Contactos</h1>
            <p>Gestiona tus contactos de forma sencilla</p>
        </header>

        <!-- Barra de búsqueda -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder=" Buscar por nombre o teléfono...">
            <button id="searchBtn" class="btn btn-primary">Buscar</button>
            <button id="clearSearchBtn" class="btn btn-secondary">Mostrar todos</button>
        </div>

        <!-- Formulario para agregar/editar -->
        <div class="form-card" id="formCard">
            <h2 id="formTitle">➕ Nuevo Contacto</h2>
            <form id="contactForm">
                <input type="hidden" id="contactId">
                
                <div class="form-group">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" required placeholder="Ingresa el nombre completo">
                </div>
                
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" placeholder="Ej: 555-1234">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com">
                </div>
                
                <div class="form-buttons">
                    <button type="submit" class="btn btn-success"> Guardar</button>
                    <button type="button" id="cancelBtn" class="btn btn-secondary"> Cancelar</button>
                </div>
            </form>
        </div>

        <!-- Lista de contactos -->
        <div class="contacts-container">
            <h2> Mis Contactos</h2>
            <div id="contactsList" class="contacts-list">
                <div class="loading">Cargando contactos...</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
